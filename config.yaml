# ============================================================
# Android Bootcamp 影片轉筆記 — 設定檔
# ============================================================

# --- 目錄設定 ---
paths:
  videos_dir: "videos"          # 影片來源目錄
  audio_dir: "audio"            # 音檔輸出目錄
  transcripts_dir: "transcripts" # 逐字稿輸出目錄
  notes_dir: "notes"            # Markdown 筆記輸出目錄
  slides_dir: "slides"          # 可選：投影片目錄（同檔名 .txt/.md/.pdf）

# --- 支援的影片格式 ---
video_extensions:
  - ".mp4"
  - ".mkv"
  - ".avi"
  - ".webm"
  - ".mov"
  - ".flv"
  - ".wmv"

# --- FFmpeg 設定 ---
ffmpeg:
  # ffmpeg_path: "ffmpeg"       # 如果 FFmpeg 不在 PATH，可在此指定完整路徑
  audio_format: "wav"           # 輸出音檔格式 (wav 最適合 Whisper)
  sample_rate: 16000            # 取樣率 (Whisper 要求 16kHz)
  channels: 1                   # 聲道數 (mono)

# --- Whisper 語音辨識設定 ---
whisper:
  # 模型選擇: tiny, base, small, medium, large-v2, large-v3, large-v3-turbo
  model: "medium"
  
  # 運算裝置: cuda (GPU) / cpu
  device: "cuda"
  
  # 精度: float16 (GPU推薦) / int8 (省記憶體) / float32 (CPU)
  compute_type: "float16"
  
  # 語言設定: null=自動偵測, "zh"=中文, "en"=英文, "ja"=日文
  language: "en"
  
  # 是否輸出含時間戳的 SRT 字幕檔
  output_srt: true
  
  # 是否輸出純文字逐字稿
  output_txt: true
  
  # Beam size (越大越準但越慢)
  beam_size: 5
  
  # VAD 過濾 (過濾靜音段落，加速處理)
  vad_filter: false
  
  # 初始提示詞 (幫助辨識專有名詞)
  initial_prompt: "This is an Android development bootcamp course covering Kotlin, Jetpack Compose, Android Studio, Activity, Fragment, ViewModel, LiveData, Room, Retrofit, Coroutines, and related technologies."

# --- LLM 筆記生成設定 ---
llm:
  # API 端點 (OpenAI 相容格式)
  # 整個專案跑在 Jetson AGX Orin 上，Ollama 使用 localhost
  # Ollama 預設: http://localhost:11434/v1
  # llama.cpp 預設: http://localhost:8080/v1
  api_base: "http://localhost:11434/v1"
  
  # API Key (Ollama 不需要，填任意值即可)
  api_key: "not-needed"
  
  # 模型名稱 (對應 Ollama 中的模型名)
  # AGX Orin 64GB 建議使用 32B 級別模型；若記憶體充足可嘗試更大尺寸
  model: "qwen3:30b"
  
  # 最大輸出 token 數
  max_tokens: 4096
  
  # Temperature (0.0~1.0，越低越精確)
  temperature: 0.3
  
  # 逐字稿分段大小 (字元數)
  # 太大可能超過 context window，太小可能丟失上下文
  chunk_size: 3000
  
  # 分段重疊字元數 (避免切斷段落)
  chunk_overlap: 200
  
  # 每次 API 呼叫之間的延遲 (秒)，避免 OOM
  request_delay: 1.0
  
  # 最大重試次數
  max_retries: 3

  # slides 檢索：先把 slides 切成小段，再針對每個 transcript chunk 取 top-k
  slides_block_chars: 1400
  slides_block_overlap: 120
  # 建議 2：優先每段提供較完整脈絡，而不是塞太多短片段
  slides_top_k_per_chunk: 2
  slides_snippet_max_chars: 900
  slides_min_snippet_chars: 450
  # 最終要送進 prompt 的片段最小可用長度；太短會被淘汰（fallback 除外）
  slides_min_accepted_snippet_chars: 320
  slides_context_chars_per_chunk: 2600
  slides_retrieval_min_score: 10
  slides_min_overlap_terms: 2
  slides_min_block_chars: 140
  # false: 允許同頁多段，避免為了湊頁面多樣性而挑到過短內容
  slides_prefer_page_diversity: false

# --- 中文筆記生成設定（小模型友善） ---
llm_zh:
  # 可留空沿用 llm.model；若要分開模型可在此指定
  model: "qwen3:30b"

  # 中文改寫建議較低溫，減少翻譯腔與格式漂移
  temperature: 0.15

  # 中文輸出 token 上限
  max_tokens: 4096

  # 中文改寫分段（來源是英文詳細筆記）
  chunk_size: 2600
  chunk_overlap: 180

  # 單段最少字數，低於此值會觸發自動修正
  min_chunk_chars: 260

  # 中文段落呼叫重試次數
  max_retries: 3

# --- 筆記格式設定 ---
notes:
  # 筆記語言: "zh-TW" (繁體中文), "en" (英文)
  language: "en"

  # 是否啟用 slides 內容作為逐段參考（關閉可僅依逐字稿生成）
  use_slides_context: false
  
  # 是否在筆記中包含時間戳記
  include_timestamps: true
  
  # 是否允許筆記輸出程式碼；false 會完全禁止 code block，改以文字描述
  detect_code: false
  
  # 是否在最後生成摘要
  generate_summary: true
  
  # 是否在最後生成 Q&A
  generate_qa: true

  # 是否額外生成繁中筆記（含摘要與詳細筆記，台灣慣用詞）
  generate_zh_summary: true

  # 中文術語偏好（可持續擴充）
  zh_glossary:
    - "Activity：活動"
    - "Fragment：片段"
    - "ViewModel：檢視模型"
    - "Coroutine：協程"
    - "Thread：執行緒"
    - "Memory：記憶體"
    - "Pipeline：處理流程"
